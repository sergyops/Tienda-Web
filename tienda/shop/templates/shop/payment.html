{% extends 'base.html' %}

{% block title %}Pago{% endblock %}

{% block content %}
    <form method="post">
    {% csrf_token %}

    <label>Nombre en la tarjeta:</label><br>
    <input type="text" name="name" required><br><br>

    <label>Número de tarjeta:</label><br>
    <input type="text" name="card" required><br><br>

    <label>Fecha de caducidad:</label><br>
    <input type="text" name="expiry" placeholder="MM/AA" required><br><br>

    <label>CVV:</label><br>
    <input type="text" name="cvv" required><br><br>

    <button type="submit">Pagar</button>
</form>
{% endblock %}
