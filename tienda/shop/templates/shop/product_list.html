{% extends 'base.html' %}

{% block title %}Lista de productos{% endblock %}

{% block content %}

<h1 class="mb-4">Productos</h1>

<div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4">

    {% for product in products %}
    <div class="col">

        <div class="card h-100 shadow-sm">

            <!-- Imagen -->
            <a href="{% url 'product_detail' product.id %}">
                {% if product.image %}
                    <img src="{{ product.image.url }}" class="card-img-top" style="height:200px; object-fit:cover;">
                {% else %}
                    <div style="height:200px; background:#f2f2f2;" class="d-flex align-items-center justify-content-center">
                        Sin imagen
                    </div>
                {% endif %}
            </a>

            <!-- Cuerpo -->
            <div class="card-body d-flex flex-column">

                <!-- Nombre -->
                <h5 class="card-title">
                    <a href="{% url 'product_detail' product.id %}" class="text-decoration-none text-dark">
                        {{ product.name }}
                    </a>
                </h5>

                <!-- Precio -->
                <p class="fw-bold text-danger mb-3">
                    {{ product.price }} €
                </p>

                <!-- Botón ver -->
                <a href="{% url 'product_detail' product.id %}" class="btn btn-primary mt-auto">
                    Ver producto
                </a>

            </div>
        </div>

    </div>
    {% endfor %}

</div>

{% endblock %}
