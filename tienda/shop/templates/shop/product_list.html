{% extends 'base.html' %}

{% block title %}Lista de productos{% endblock %}

{% block content %}
    <h1>Productos</h1>

    {% for product in products %}
        <div>
            <h2><a href="{% url 'product_detail' product.id %}">{{ product.name }}</a></h2>
            <p>{{ product.description }}</p>
            <p>{{ product.price }} €</p>
        </div>
        <hr>
    {% endfor %}

{% endblock %}
