{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear cuenta</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Fondo */
        .bg-image {
            position: absolute;
            inset: 0;
            background-image: url("{% static 'img/Background_LoginRegister.png' %}");
            background-size: cover;
            background-position: center;
            filter: blur(8px);
            transform: scale(1.1);
        }

        /* Oscurecer */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.45);
        }

        /* Card */
        .auth-card {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 450px;
            padding: 2rem;
            border-radius: 12px;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* Botón rojo */
        .btn-primary {
            background-color: #e53935;
            border-color: #e53935;
        }

        .btn-primary:hover {
            background-color: #c62828;
        }

        /* Inputs */
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 6px;
            border: 1px solid #ddd;
        }
    </style>
</head>

<body>

    <!-- Fondo -->
    <div class="bg-image"></div>
    <div class="overlay"></div>

    <!-- Registro -->
    <div class="auth-card">

        <h2 class="text-center mb-4 fw-bold">Crear cuenta</h2>

        <form method="post">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn btn-primary w-100 mt-3">
                Registrarse
            </button>
        </form>

    </div>

</body>
</html>
