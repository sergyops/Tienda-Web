{% extends 'base.html' %}

{% block title %}Contacto{% endblock %}

{% block content %}

<div class="d-flex justify-content-center">

    <div class="card shadow-sm p-4 w-100" style="max-width: 600px;">

        <h2 class="text-center mb-4 fw-bold">Contacto</h2>

        <p class="text-muted text-center mb-4">
            Envíanos tu mensaje y te responderemos lo antes posible.
        </p>

        <form method="post">
            {% csrf_token %}

            <!-- Formulario Django -->
            {{ form.as_p }}

            <button type="submit" class="btn btn-primary w-100 mt-3">
                Enviar mensaje
            </button>

        </form>

    </div>

</div>

{% endblock %}
